server:
  port: 8090
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

# Mesmo segredo que auth-service (assinatura HMAC do JWT enviado ao browser).
jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-min-32-chars-ok}

spring:
  application:
    name: bff-service

# URLs dos outros microsserviços (cada um é processo/JAR separado)
coupons:
  ingress:
    internal-api-key: ${INTERNAL_API_KEY:dev-internal-api-key-change-me}
  services:
    auth-url: http://localhost:8081
    profile-url: http://localhost:8082
    campaigns-url: http://localhost:8083
    ledger-url: http://localhost:8084
    prizes-url: http://localhost:8085
    daily-chest-url: http://localhost:8086

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

