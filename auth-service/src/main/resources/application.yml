server:
  port: 8081
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:mysql://localhost:3307/auth?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: auth_svc
    password: ${AUTH_DB_PASSWORD:auth_dev_change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-min-32-chars-ok}
  expiration-hours: ${JWT_EXPIRATION_HOURS:24}

# E-mails (separados por vírgula) que recebem papel ADMIN ao arrancar, se a conta já existir.
auth:
  bootstrap-admin-emails: ${AUTH_BOOTSTRAP_ADMIN_EMAILS:}

coupons:
  ingress:
    internal-api-key: ${INTERNAL_API_KEY:dev-internal-api-key-change-me}
    jwt-secret: ${JWT_SECRET:dev-secret-change-in-production-min-32-chars-ok}
    allow-public-auth-register-and-login: true
  services:
    profile-url: ${PROFILE_SERVICE_URL:http://localhost:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

