server:
  port: 8086

spring:
  application:
    name: daily-chest-service
  datasource:
    url: jdbc:mysql://localhost:3307/daily_chest?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: daily_chest_svc
    password: ${DAILY_CHEST_DB_PASSWORD:daily_chest_dev_change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

coupons:
  profile:
    base-url: ${PROFILE_SERVICE_BASE_URL:http://localhost:8082}
  kafka:
    topic-chest-bonus-granted: ${KAFKA_TOPIC_CHEST_BONUS_GRANTED:chest.bonus.granted}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
