server:
  port: 8085

spring:
  application:
    name: prizes-service
  datasource:
    url: jdbc:mysql://localhost:3307/prizes?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: prizes_svc
    password: ${PRIZES_DB_PASSWORD:prizes_dev_change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: true

coupons:
  ingress:
    internal-api-key: ${INTERNAL_API_KEY:dev-internal-api-key-change-me}
    jwt-secret: ${JWT_SECRET:dev-secret-change-in-production-min-32-chars-ok}
  kafka:
    topic-prize-distribution-request: ${KAFKA_TOPIC_PRIZE_DISTRIBUTION_REQUEST:prize.distribution.request}
    consumer-group: ${KAFKA_CONSUMER_GROUP_PRIZES:prizes-service}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

