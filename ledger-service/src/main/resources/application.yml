server:
  port: 8084

spring:
  application:
    name: ledger-service
  datasource:
    url: jdbc:mysql://localhost:3307/ledger?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: ledger_svc
    password: ${LEDGER_DB_PASSWORD:ledger_dev_change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_LEDGER:ledger-service}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

coupons:
  ingress:
    internal-api-key: ${INTERNAL_API_KEY:dev-internal-api-key-change-me}
    jwt-secret: ${JWT_SECRET:dev-secret-change-in-production-min-32-chars-ok}
  kafka:
    consumer-group: ${KAFKA_CONSUMER_GROUP_LEDGER:ledger-service}
    topic-campaign-subscription-debit-request: ${KAFKA_TOPIC_CAMPAIGN_SUBSCRIPTION_DEBIT_REQUEST:campaign.subscription.debit.request}
    topic-campaign-subscription-payment-succeeded: ${KAFKA_TOPIC_CAMPAIGN_SUBSCRIPTION_PAYMENT_SUCCEEDED:campaign.subscription.payment.succeeded}
    topic-campaign-subscription-payment-failed: ${KAFKA_TOPIC_CAMPAIGN_SUBSCRIPTION_PAYMENT_FAILED:campaign.subscription.payment.failed}
    topic-referral-bonus-granted: ${KAFKA_TOPIC_REFERRAL_BONUS_GRANTED:referral.bonus.granted}
    topic-chest-bonus-granted: ${KAFKA_TOPIC_CHEST_BONUS_GRANTED:chest.bonus.granted}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

