server:
  port: 8082

spring:
  application:
    name: profile-service
  datasource:
    url: jdbc:mysql://localhost:3307/profile?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: profile_svc
    password: ${PROFILE_DB_PASSWORD:profile_dev_change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

coupons:
  kafka:
    topic-referral-bonus-granted: ${KAFKA_TOPIC_REFERRAL_BONUS_GRANTED:referral.bonus.granted}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

